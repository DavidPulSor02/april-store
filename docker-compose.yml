version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "3000:3000"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/april-store
      - JWT_SECRET=april_store_super_secret_docker_2024
      - PORT=3000
    depends_on:
      - mongodb
    networks:
      - april-store-network

  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - april-store-network

networks:
  april-store-network:
    driver: bridge

volumes:
  mongodb_data:
